    <header class="page-hero">
        <div class="container">
            <h1 class="display-6 fw-bold mb-3">Blog</h1>
            <p class="lead mb-0">Notes, reflections, and updates on research, teaching, and cheminformatics practice.</p>
        </div>
    </header>

    <main class="container my-5">
        <section class="card p-4 mb-4">
            <h2 class="h4 mb-2">Latest posts</h2>
        </section>
        <div id="blog-posts" class="row g-4"></div>
    </main>

    <script>
        async function loadPosts() {
            const container = document.getElementById('blog-posts');
            const localPosts = await fetch('posts.json?cb=' + Date.now())
                .then(res => res.json())
                .catch(() => []);

            const posts = localPosts
                .sort((a, b) => {
                    const dateA = a.date ? new Date(a.date) : new Date(0);
                    const dateB = b.date ? new Date(b.date) : new Date(0);
                    return dateB - dateA;
                });

            if (!posts.length) {
                container.innerHTML = '<p class="text-muted mb-0">No posts available yet.</p>';
                return;
            }

            container.innerHTML = posts.map(post => `
                <article class="col-md-6">
                    <div class="card p-4 h-100">
                        ${post.cover_image ? `<img src="${post.cover_image}" alt="${post.title}" class="img-fluid rounded mb-3">` : ''}
                        <p class="text-muted small mb-2">${post.date || 'Latest update'}</p>
                        <h3 class="h4 mb-2">${post.title}</h3>
                        <p class="text-muted mb-0">${post.excerpt || ''}</p>
                        ${post.slug
                            ? `<a href="post.html?slug=${post.slug}" class="btn btn-sm btn-outline-dark mt-3">Read article</a>`
                            : ''}
                    </div>
                </article>
            `).join('');
        }

        loadPosts();
    </script>

    <footer class="footer text-center py-4 mt-auto">
