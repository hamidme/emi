<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>Blog | Dr. Hammed Wasiu Adebayo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        :root { --dark-blue:#0f2027; --teal:#203a43; --light-teal:#2c5364; }
        body { font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; color:#333; background-color:#f8f9fa; }
        .page-hero { background:linear-gradient(to right,var(--dark-blue),var(--teal),var(--light-teal)); color:white; padding:60px 0; }
        .card { border:none; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
        .footer { background-color:var(--dark-blue); color:#ccc; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <a class="navbar-brand" href="index.html">Dr. Wasiu Hammed</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="publications.html">Publications</a></li>
                    <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="aci.html">ACI</a></li>
                    <li class="nav-item"><a class="nav-link active" href="blog.html">Blog</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="page-hero">
        <div class="container">
            <h1 class="display-6 fw-bold mb-3">Blog</h1>
            <p class="lead mb-0">Notes, reflections, and updates on research, teaching, and cheminformatics practice.</p>
        </div>
    </header>

    <main class="container my-5">
        <section class="card p-4 mb-4">
            <h2 class="h4 mb-2">Latest posts</h2>
        </section>
        <div id="blog-posts" class="row g-4"></div>
    </main>

    <script>
        function stripHtml(value) {
            return value
                .replace(/<[^>]+>/g, ' ')
                .replace(/&nbsp;/gi, ' ')
                .replace(/&amp;/gi, '&')
                .replace(/&quot;/gi, '"')
                .replace(/&#39;/gi, "'")
                .replace(/\s+/g, ' ')
                .trim();
        }

        function formatExcerpt(text, maxLength = 150) {
            const clean = stripHtml(text || '');
            return clean.length > maxLength ? clean.slice(0, maxLength) + '…' : clean;
        }

        async function loadMediumPosts() {
            try {
                const response = await fetch('https://api.rss2json.com/v1/api.json?rss_url=https://medium.com/feed/@hwaasi');
                const data = await response.json();

                if (!data.items || data.status !== 'ok') return [];

                return data.items.slice(0, 1).map(item => ({
                    title: item.title || 'Medium article',
                    date: item.pubDate ? item.pubDate.slice(0, 10) : '',
                    excerpt: formatExcerpt(item.description || item.content || ''),
                    link: item.link || 'https://medium.com/@hwaasi'
                }));
            } catch (error) {
                return [];
            }
        }

        async function loadPosts() {
            const container = document.getElementById('blog-posts');
            const [mediumPosts, localPosts] = await Promise.all([
                loadMediumPosts(),
                fetch('posts.json').then(res => res.json()).catch(() => [])
            ]);

            const posts = [...mediumPosts, ...localPosts];

            container.innerHTML = posts.map(post => `
                <article class="col-md-6">
                    <div class="card p-4 h-100">
                        <p class="text-muted small mb-2">${post.date || 'Latest update'}</p>
                        <h3 class="h4 mb-2">${post.title}</h3>
                        <p class="text-muted mb-0">${post.excerpt}</p>
                        ${post.link ? `<a href="${post.link}" target="_blank" class="btn btn-sm btn-outline-dark mt-3">Read on Medium</a>` : ''}
                    </div>
                </article>
            `).join('');
        }

        loadPosts();
    </script>

    <footer class="footer text-center py-4 mt-auto">
        <div class="container"><p class="mb-0">&copy; 2026 Dr. Hammed Wasiu Adebayo.</p></div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
